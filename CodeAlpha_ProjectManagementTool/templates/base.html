{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WorkSphere</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            ⚡ WorkSphere
        </div>

        <nav>
            

            <a class="nav-item active" href="{% url 'dashboard' %}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a class="nav-item" href="{% url 'project_list' %}">
                <i class="bi bi-kanban"></i> Projects
            </a>

            <a class="nav-item" href="/tasks/kanban/">
                <i class="bi bi-check2-square"></i> Tasks
            </a>

            <a class="nav-item" href="/analytics/">
                <i class="bi bi-graph-up"></i> Analytics
            </a>

            <a class="nav-item" href="{% url 'notifications' %}">
                <i class="bi bi-bell"></i> Notifications
            </a>

        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOP BAR -->
        <div class="topbar">

            <!-- SEARCH (FIXED - REAL FORM) -->
            <form class="search" action="{% url 'search' %}" method="GET">
    <input type="text" name="q" placeholder="Search tasks, projects...">
</form>

            <div class="user">
                <a href="{% url 'notifications' %}" class="notification-bell" aria-label="Notifications">
                    <i class="bi bi-bell-fill"></i>
                    <span id="notification-count" {% if unread_notifications_count == 0 %}class="d-none"{% endif %}>
                        {{ unread_notifications_count }}
                    </span>
                </a>
                <div class="avatar">N</div>
            </div>

        </div>

        {% block content %}{% endblock %}

    </main>

</div>
<script>
const notificationBell = document.getElementById("notification-count");
const toastStack = document.createElement("div");
toastStack.className = "notification-toast-stack";
document.body.appendChild(toastStack);

function showNotificationToast(message, createdAt) {
    const toast = document.createElement("div");
    toast.className = "notification-toast";
    toast.innerHTML = `
        <div class="notification-toast-icon"><i class="bi bi-bell-fill"></i></div>
        <div>
            <strong>New notification</strong>
            <p>${message}</p>
            <small>${createdAt || "Just now"}</small>
        </div>
    `;
    toastStack.prepend(toast);
    setTimeout(() => toast.remove(), 6500);
}

function increaseNotificationCount() {
    if (!notificationBell) return;
    const current = parseInt(notificationBell.textContent.trim() || "0", 10);
    notificationBell.textContent = current + 1;
    notificationBell.classList.remove("d-none");
}

window.alert = function() {};
const protocol = window.location.protocol === "https:" ? "wss" : "ws";
const socket = new WebSocket(`${protocol}://${window.location.host}/ws/notifications/`);

socket.addEventListener("message", function(event) {
    const data = JSON.parse(event.data);
    increaseNotificationCount();
    showNotificationToast(data.message, data.created_at);
});

socket.addEventListener("close", function() {
    console.log("Notification socket closed.");
});

socket.onmessage = function(event) {
    const data = JSON.parse(event.data);
    alert("🔔 " + data.message);
};
</script>
</body>
</html>
