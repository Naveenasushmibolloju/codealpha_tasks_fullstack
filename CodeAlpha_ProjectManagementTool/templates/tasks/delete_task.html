{% extends 'base.html' %}

{% block content %}

<div class="card-box">

    <h2>Delete Task</h2>

    <p>
        Are you sure you want to delete
        <strong>{{ task.title }}</strong>?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button type="submit"
                class="btn btn-danger">
            Delete
        </button>

        <a href="{% url 'task_detail' task.id %}"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
